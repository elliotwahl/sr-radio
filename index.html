<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SR Live</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:           #F0EFEB;
      --surface:      #FFFFFF;
      --surface2:     #F5F4F0;
      --border:       #DDDBD5;
      --text:         #1A1A1A;
      --text-muted:   #6B6860;
      --accent:       #0056A8;
      --accent-light: #E8F0FA;
      --accent-hover: #003F80;
      --green:        #1A8A3E;
      --green-light:  #E6F4EC;
      --orange:       #D46000;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Figtree', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── HEADER ─────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 1.25rem 2rem;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 2rem;
    }

    /* Station info */
    .station-info {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      min-width: 0;
    }

    .station-text { min-width: 0; }

    .wordmark {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.2rem;
    }

    .station-name {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.25s;
    }

    .station-name.idle {
      color: var(--text-muted);
      font-weight: 400;
    }

    .station-sub {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-top: 0.15rem;
      height: 1.1em;
    }

    /* VU Bars */
    .vu {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 28px;
      flex-shrink: 0;
    }

    .vu-bar {
      width: 4px;
      background: var(--border);
      border-radius: 2px 2px 0 0;
      height: 4px;
    }

    .vu.active .vu-bar:nth-child(1) { animation: vu1 0.75s ease-in-out infinite alternate; }
    .vu.active .vu-bar:nth-child(2) { animation: vu1 0.55s ease-in-out infinite alternate 0.12s; }
    .vu.active .vu-bar:nth-child(3) { animation: vu1 0.95s ease-in-out infinite alternate 0.24s; }
    .vu.active .vu-bar:nth-child(4) { animation: vu1 0.65s ease-in-out infinite alternate 0.08s; }
    .vu.active .vu-bar:nth-child(5) { animation: vu1 0.85s ease-in-out infinite alternate 0.18s; }
    .vu.active .vu-bar:nth-child(6) { animation: vu1 0.70s ease-in-out infinite alternate 0.30s; }
    .vu.active .vu-bar:nth-child(7) { animation: vu1 1.10s ease-in-out infinite alternate 0.05s; }

    @keyframes vu1 {
      0%   { height: 4px;  background: var(--border); }
      60%  { height: 16px; background: var(--accent); }
      100% { height: 28px; background: var(--accent); }
    }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      flex-shrink: 0;
    }

    /* Status */
    .status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .dot.live {
      background: var(--green);
      box-shadow: 0 0 0 3px var(--green-light);
      animation: blink 2s ease-in-out infinite;
    }

    .dot.loading {
      background: var(--orange);
      animation: blink 0.6s ease-in-out infinite;
    }

    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

    .status-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Volume */
    .vol-wrap {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .vol-icon { color: var(--text-muted); width: 16px; height: 16px; flex-shrink: 0; }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 80px;
      height: 4px;
      background: var(--border);
      outline: none;
      border-radius: 2px;
      cursor: pointer;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      transition: transform 0.15s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.15); }

    /* Quality */
    .quality {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      background: var(--surface2);
    }

    .q-btn {
      padding: 0.4rem 0.65rem;
      font-family: 'Figtree', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      border-right: 1px solid var(--border);
    }

    .q-btn:last-child { border-right: none; }
    .q-btn:hover { color: var(--text); background: var(--border); }

    .q-btn.active {
      background: var(--accent);
      color: #fff;
    }

    /* Play button */
    .play-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,86,168,0.3);
    }

    .play-btn:not(:disabled):hover {
      background: var(--accent-hover);
      transform: scale(1.05);
      box-shadow: 0 4px 16px rgba(0,86,168,0.35);
    }

    .play-btn:disabled {
      background: var(--border);
      box-shadow: none;
      cursor: default;
    }

    .play-btn svg { width: 20px; height: 20px; }

    /* ─── MAIN ────────────────────────────────── */
    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 2.5rem 2rem 5rem;
    }

    .section { margin-bottom: 2.5rem; }

    .section-head {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .section-label {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .section-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Channel grids */
    .grid {
      display: grid;
      gap: 0.5rem;
    }

    .grid-national { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
    .grid-special  { grid-template-columns: repeat(auto-fill, minmax(175px, 1fr)); }
    .grid-local    { grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); }

    /* Channel button */
    .ch-btn {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 1rem 1.1rem;
      text-align: left;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
      position: relative;
    }

    .ch-btn:hover {
      border-color: var(--accent);
      background: var(--accent-light);
      box-shadow: 0 2px 8px rgba(0,86,168,0.1);
    }

    .ch-btn.active {
      border-color: var(--accent);
      background: var(--accent-light);
      box-shadow: 0 0 0 3px rgba(0,86,168,0.15);
    }

    .ch-name-national {
      display: block;
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 0.3rem;
      color: var(--accent);
    }

    .ch-btn.active .ch-name-national,
    .ch-btn.active .ch-name { color: var(--accent); }

    .ch-name {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 0.2rem;
    }

    .ch-sub {
      display: block;
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    /* ─── FOOTER ──────────────────────────────── */
    footer {
      text-align: center;
      padding: 1.5rem 2rem;
      color: var(--text-muted);
      font-size: 0.78rem;
      border-top: 1px solid var(--border);
    }

    /* ─── RESPONSIVE ──────────────────────────── */
    @media (max-width: 720px) {
      .header-inner {
        grid-template-columns: 1fr;
        gap: 1rem;
        padding: 1rem 1.25rem;
      }

      .controls { flex-wrap: wrap; gap: 0.75rem; }
      .station-name { font-size: 1.4rem; }

      main { padding: 1.5rem 1.25rem 4rem; }

      .grid-national { grid-template-columns: repeat(2, 1fr); }
      .grid-special  { grid-template-columns: repeat(2, 1fr); }
      .grid-local    { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 400px) {
      .grid-national,
      .grid-special,
      .grid-local { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <!-- Station display -->
      <div class="station-info">
        <div class="station-text">
          <div class="wordmark">Sveriges Radio &mdash; Live</div>
          <div class="station-name idle" id="stationName">Välj en kanal</div>
          <div class="station-sub" id="stationSub"></div>
        </div>
        <div class="vu" id="vu">
          <div class="vu-bar"></div>
          <div class="vu-bar"></div>
          <div class="vu-bar"></div>
          <div class="vu-bar"></div>
          <div class="vu-bar"></div>
          <div class="vu-bar"></div>
          <div class="vu-bar"></div>
        </div>
      </div>

      <!-- Controls -->
      <div class="controls">
        <div class="status">
          <div class="dot" id="dot"></div>
          <span class="status-label" id="statusLabel">offline</span>
        </div>

        <div class="vol-wrap">
          <svg class="vol-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
          </svg>
          <input type="range" id="volSlider" min="0" max="1" step="0.01" value="0.85">
        </div>

        <div class="quality">
          <button class="q-btn" data-q="32">32</button>
          <button class="q-btn active" data-q="128">128</button>
          <button class="q-btn" data-q="96">96</button>
          <button class="q-btn" data-q="320">320</button>
        </div>

        <button class="play-btn" id="playBtn" disabled>
          <svg viewBox="0 0 24 24" fill="currentColor" id="playIcon">
            <path d="M8 5v14l11-7z"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="section-head">
        <span class="section-label">Rikskanaler</span>
        <div class="section-line"></div>
      </div>
      <div class="grid grid-national" id="grid-national"></div>
    </section>

    <section class="section">
      <div class="section-head">
        <span class="section-label">Övriga kanaler</span>
        <div class="section-line"></div>
      </div>
      <div class="grid grid-special" id="grid-special"></div>
    </section>

    <section class="section">
      <div class="section-head">
        <span class="section-label">Lokala P4-kanaler</span>
        <div class="section-line"></div>
      </div>
      <div class="grid grid-local" id="grid-local"></div>
    </section>
  </main>

  <footer>Inofficiell SR-spelare &mdash; Strömmar via Sveriges Radios publika direktlänkar</footer>

  <audio id="audio" preload="none"></audio>

  <script>
    // ── Data ────────────────────────────────────────────────────
    const NATIONAL = [
      { id: 'p1',  name: 'P1', sub: 'Nyheter & kultur' },
      { id: 'p2',  name: 'P2', sub: 'Klassiskt & jazz' },
      { id: 'p3',  name: 'P3', sub: 'Pop & underhållning' },
      { id: 'p6',  name: 'P6', sub: 'Rock & alternativt' },
    ];

    const SPECIAL = [
      { id: 'ekotdirekt',   name: 'Ekot direkt',      sub: 'Nyhetssändningar' },
      { id: 'dingata',      name: 'P3 Din gata',       sub: 'Hiphop & soul' },
      { id: 'p4plus',       name: 'P4 Plus',           sub: 'Underhållning' },
      { id: 'p4digi',       name: 'P4 Digital',        sub: 'Digital', noHigh: true },
      { id: 'knattekanalen',name: 'Knattekanalen',     sub: 'Radioapans barnkanal' },
      { id: 'sameradion',   name: 'Sameradion',        sub: 'Samisk radio' },
      { id: 'finska',       name: 'SR Finska',         sub: 'Sveriges Radio Finska' },
    ];

    const LOCAL = [
      { id: 'p4blek',  name: 'P4 Blekinge' },
      { id: 'p4dala',  name: 'P4 Dalarna' },
      { id: 'p4gotl',  name: 'P4 Gotland' },
      { id: 'p4gavl',  name: 'P4 Gävleborg' },
      { id: 'p4gbg',   name: 'P4 Göteborg' },
      { id: 'p4hall',  name: 'P4 Halland' },
      { id: 'p4jmtl',  name: 'P4 Jämtland' },
      { id: 'p4jkpg',  name: 'P4 Jönköping' },
      { id: 'p4kalm',  name: 'P4 Kalmar' },
      { id: 'p4krist', name: 'P4 Kristianstad' },
      { id: 'p4kron',  name: 'P4 Kronoberg' },
      { id: 'p4malm',  name: 'P4 Malmöhus' },
      { id: 'p4nbtn',  name: 'P4 Norrbotten' },
      { id: 'p4sju',   name: 'P4 Sjuhärad' },
      { id: 'p4skbg',  name: 'P4 Skaraborg' },
      { id: 'p4sth',   name: 'P4 Stockholm' },
      { id: 'p4sorm',  name: 'P4 Sörmland' },
      { id: 'p4uppl',  name: 'P4 Uppland' },
      { id: 'p4vrml',  name: 'P4 Värmland' },
      { id: 'p4vast',  name: 'P4 Väst' },
      { id: 'p4vbtn',  name: 'P4 Västerbotten' },
      { id: 'p4vnrl',  name: 'P4 Västernorrland' },
      { id: 'p4vstm',  name: 'P4 Västmanland' },
      { id: 'p4oreb',  name: 'P4 Örebro' },
      { id: 'p4ostg',  name: 'P4 Östergötland' },
    ];

    // ── State ───────────────────────────────────────────────────
    const audio     = document.getElementById('audio');
    const playBtn   = document.getElementById('playBtn');
    const playIcon  = document.getElementById('playIcon');
    const nameEl    = document.getElementById('stationName');
    const subEl     = document.getElementById('stationSub');
    const dot       = document.getElementById('dot');
    const label     = document.getElementById('statusLabel');
    const vu        = document.getElementById('vu');
    const volSlider = document.getElementById('volSlider');

    let current  = null;
    let quality  = '128';

    const ICONS = {
      play:  '<path d="M8 5v14l11-7z"/>',
      pause: '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>',
    };

    // ── URL builder ─────────────────────────────────────────────
    function streamUrl(ch, q) {
      const id = ch.id;
      if (q === '96')  return `https://live1.sr.se/${id}-mp3-96`;
      if (q === '32')  return ch.noHigh ? `https://live1.sr.se/${id}-aac-128` : `https://live1.sr.se/${id}-aac-32`;
      if (q === '320') return ch.noHigh ? `https://live1.sr.se/${id}-aac-128` : `https://live1.sr.se/${id}-aac-320`;
      return `https://live1.sr.se/${id}-aac-128`;
    }

    // ── Render ──────────────────────────────────────────────────
    function renderChannel(ch, container, isNational) {
      const btn = document.createElement('button');
      btn.className = 'ch-btn';
      btn.dataset.id = ch.id;

      if (isNational) {
        btn.innerHTML = `
          <span class="ch-name-national">${ch.name}</span>
          ${ch.sub ? `<span class="ch-sub">${ch.sub}</span>` : ''}
        `;
      } else {
        btn.innerHTML = `
          <span class="ch-name">${ch.name}</span>
          ${ch.sub ? `<span class="ch-sub">${ch.sub}</span>` : ''}
        `;
      }

      btn.addEventListener('click', () => select(ch, btn));
      container.appendChild(btn);
    }

    const natGrid  = document.getElementById('grid-national');
    const specGrid = document.getElementById('grid-special');
    const locGrid  = document.getElementById('grid-local');

    NATIONAL.forEach(ch => renderChannel(ch, natGrid, true));
    SPECIAL.forEach(ch  => renderChannel(ch, specGrid, false));
    LOCAL.forEach(ch    => renderChannel(ch, locGrid, false));

    // ── Select channel ──────────────────────────────────────────
    function select(ch, btn) {
      document.querySelectorAll('.ch-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      current = ch;
      nameEl.textContent = ch.name;
      nameEl.classList.remove('idle');
      subEl.textContent = ch.sub || '';
      playBtn.disabled = false;

      audio.src = streamUrl(ch, quality);
      audio.volume = parseFloat(volSlider.value);
      audio.play().catch(() => {});
    }

    // ── Playback state ──────────────────────────────────────────
    function setState(state) {
      dot.className = 'dot';
      vu.classList.remove('active');
      playIcon.innerHTML = ICONS.play;

      if (state === 'playing') {
        dot.classList.add('live');
        label.textContent = 'live';
        vu.classList.add('active');
        playIcon.innerHTML = ICONS.pause;
      } else if (state === 'loading') {
        dot.classList.add('loading');
        label.textContent = 'laddar';
      } else if (state === 'error') {
        label.textContent = 'fel';
      } else if (state === 'paused') {
        label.textContent = 'pausad';
      } else {
        label.textContent = 'offline';
      }
    }

    audio.addEventListener('playing', () => setState('playing'));
    audio.addEventListener('pause',   () => setState(current ? 'paused' : 'offline'));
    audio.addEventListener('waiting', () => setState('loading'));
    audio.addEventListener('stalled', () => setState('loading'));
    audio.addEventListener('error',   () => setState('error'));

    playBtn.addEventListener('click', () => {
      if (!current) return;
      if (audio.paused) {
        if (!audio.src) audio.src = streamUrl(current, quality);
        audio.play().catch(() => {});
      } else {
        audio.pause();
      }
    });

    // ── Volume ──────────────────────────────────────────────────
    volSlider.addEventListener('input', () => {
      audio.volume = parseFloat(volSlider.value);
    });

    // ── Quality ─────────────────────────────────────────────────
    document.querySelectorAll('.q-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        quality = btn.dataset.q;
        if (current) {
          const wasPlaying = !audio.paused;
          audio.src = streamUrl(current, quality);
          if (wasPlaying) audio.play().catch(() => {});
        }
      });
    });
  </script>
</body>
</html>
